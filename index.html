<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>TON Earn — এড দেখে পয়েন্ট ইনকাম করুন</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div id="app">
  <!-- SPLASH -->
  <div id="splash" class="splash">
    <div class="splash-coin">💰</div>
    <h1>TON Earn</h1>
    <p>এড দেখে পয়েন্ট ইনকাম করুন</p>
    <div class="loader-bar"><div class="loader-fill"></div></div>
  </div>

  <!-- MAIN APP -->
  <div id="main" style="display:none">
    <div id="screen-home"    class="screen active"></div>
    <div id="screen-tasks"   class="screen"></div>
    <div id="screen-games"   class="screen"></div>
    <div id="screen-wallet"  class="screen"></div>
    <div id="screen-profile" class="screen"></div>
    <div id="screen-admin"   class="screen"></div>

    <nav id="bottom-nav">
      <button class="nav-btn active" data-tab="home">
        <span class="nav-icon">🏠</span><span class="nav-label">হোম</span>
      </button>
      <button class="nav-btn" data-tab="tasks">
        <span class="nav-icon">✅</span><span class="nav-label">টাস্ক</span>
      </button>
      <button class="nav-btn" data-tab="games">
        <span class="nav-icon">🎮</span><span class="nav-label">গেম</span>
      </button>
      <button class="nav-btn" data-tab="wallet">
        <span class="nav-icon">💸</span><span class="nav-label">ওয়ালেট</span>
      </button>
      <button class="nav-btn" data-tab="profile">
        <span class="nav-icon">👤</span><span class="nav-label">প্রোফাইল</span>
      </button>
    </nav>
  </div>

  <div id="toast"></div>
  <div id="modal-backdrop" class="modal-backdrop hidden" onclick="closeModal()"></div>
  <div id="modal" class="modal hidden"></div>
</div>

<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/screens/home.js"></script>
<script src="/js/screens/tasks.js"></script>
<script src="/js/screens/games.js"></script>
<script src="/js/screens/wallet.js"></script>
<script src="/js/screens/profile.js"></script>
<script src="/js/screens/admin.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
